name: Live provider smoke

on:
  schedule:
    - cron: "43 7 * * 2,5"
  pull_request:
    paths:
      - "src/providers/**"
      - "config/providers/**"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  smoke:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: live-provider-smoke
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check live-provider credential availability
        id: live-credentials
        env:
          BRIGHT_DATA_CUSTOMER_ID: ${{ secrets.BRIGHT_DATA_CUSTOMER_ID }}
          BRIGHT_DATA_ZONE: ${{ secrets.BRIGHT_DATA_ZONE }}
          BRIGHT_DATA_PASSWORD: ${{ secrets.BRIGHT_DATA_PASSWORD }}
          BRIGHT_DATA_API_KEY: ${{ secrets.BRIGHT_DATA_API_KEY }}
          PROXIDIZE_API_TOKEN: ${{ secrets.PROXIDIZE_API_TOKEN }}
        shell: bash
        run: |
          if [[ -n "$BRIGHT_DATA_CUSTOMER_ID" && -n "$BRIGHT_DATA_ZONE" && -n "$BRIGHT_DATA_PASSWORD" && -n "$BRIGHT_DATA_API_KEY" && -n "$PROXIDIZE_API_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Live provider smoke skipped because the environment has no vendor credentials."
          fi
      - name: Run live provider smoke
        if: steps.live-credentials.outputs.available == 'true'
        run: pnpm test:live
        env:
          PROVIDER_MODE: live
          BRIGHT_DATA_CUSTOMER_ID: ${{ secrets.BRIGHT_DATA_CUSTOMER_ID }}
          BRIGHT_DATA_ZONE: ${{ secrets.BRIGHT_DATA_ZONE }}
          BRIGHT_DATA_PASSWORD: ${{ secrets.BRIGHT_DATA_PASSWORD }}
          BRIGHT_DATA_API_KEY: ${{ secrets.BRIGHT_DATA_API_KEY }}
          PROXIDIZE_API_TOKEN: ${{ secrets.PROXIDIZE_API_TOKEN }}
      - name: Require credentials for scheduled and manual smoke runs
        if: steps.live-credentials.outputs.available != 'true' && github.event_name != 'pull_request'
        run: |
          echo "::error::Live provider credentials are required for scheduled and manual smoke runs."
          exit 1
