name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_dispatch:
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install SST providers and generated types
        run: pnpm sst install
      - run: pnpm --dir tools/lint install --frozen-lockfile
      - name: Prettier
        run: pnpm format:check
      - name: Type-aware ESLint (TypeScript 6 toolchain)
        run: pnpm lint
      - name: TypeScript 7 authoritative compiler
        run: pnpm check
      - name: Vitest and Effect tests
        run: pnpm test:unit
      - name: fast-check properties
        run: pnpm test:property
      - name: Offline integration and contract tests
        run: pnpm test
      - name: Generated OpenAPI is current
        run: pnpm openapi:check
      - name: Check control-plane compatibility with pull request base
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          baseline="$(git ls-tree -r --name-only "origin/${{ github.base_ref }}" | grep -E '^openapi/profound-control-api\.v[0-9]+\.[0-9]+\.[0-9]+\.json$' | sort -V | tail -n1 || true)"
          if [[ -n "$baseline" ]]; then
            git show "origin/${{ github.base_ref }}:$baseline" > /tmp/base-openapi.json
            pnpm openapi:compat -- /tmp/base-openapi.json
          else
            echo "No base OpenAPI artifact; compatibility comparison is not applicable."
          fi
      - name: Migration declaration and sensitive-path policy
        if: github.event_name == 'pull_request'
        run: pnpm pr:policy
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Build deployable
        run: docker build --tag profound-proxy-router:${{ github.sha }} .
      - uses: actions/upload-artifact@v4
        with:
          name: profound-control-api-openapi
          path: openapi/profound-control-api.v*.json
          if-no-files-found: error
