name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
  workflow_dispatch:
  merge_group:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install SST providers and generated types
        run: pnpm sst install
      - run: pnpm --dir tools/lint install --frozen-lockfile
      - name: Prettier
        run: pnpm format:check
      - name: Type-aware ESLint (TypeScript 6 toolchain)
        run: pnpm lint
      - name: TypeScript 7 authoritative compiler
        run: pnpm check
      - name: Vitest, Effect, and fast-check property tests
        run: pnpm test:property
      - name: Offline integration and contract tests with coverage thresholds
        run: pnpm test:coverage
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
      - name: Generated OpenAPI is current
        run: pnpm openapi:check
      - name: Check control-plane compatibility with pull request base
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          baseline="$(git ls-tree -r --name-only "origin/${{ github.base_ref }}" | grep -E '^openapi/profound-control-api\.v[0-9]+\.[0-9]+\.[0-9]+\.json$' | sort -V | tail -n1 || true)"
          if [[ -n "$baseline" ]]; then
            git show "origin/${{ github.base_ref }}:$baseline" > /tmp/base-openapi.json
            pnpm openapi:compat -- /tmp/base-openapi.json
          else
            echo "No base OpenAPI artifact; compatibility comparison is not applicable."
          fi
      - name: Migration declaration and sensitive-path policy
        if: github.event_name == 'pull_request'
        run: pnpm pr:policy
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Build deployable
        run: docker build --tag profound-proxy-router:${{ github.sha }} .
      - name: Scan deployable image for known vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: profound-proxy-router:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: profound-control-api-openapi
          path: openapi/profound-control-api.v*.json
          if-no-files-found: error

  dependency-review:
    if: >-
      github.event_name == 'pull_request' &&
      (github.event.repository.private == false ||
      github.event.repository.security_and_analysis.advanced_security.status == 'enabled')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
